name: Send reminders

# Envía recordatorios de cierre de predicción.
# INACTIVO: planificado para una próxima versión (requiere Resend).
# El cron horario está desactivado; queda solo el disparo manual.
on:
  workflow_dispatch: {}

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-reminders endpoint
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/notifications/send-reminders"
