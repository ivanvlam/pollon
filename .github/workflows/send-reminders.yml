name: Send reminders

# Envía recordatorios de cierre de predicción. Cada hora.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-reminders endpoint
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/notifications/send-reminders"
