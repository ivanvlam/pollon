name: Sync matches

# Sincroniza fixture y resultados desde TheSportsDB cada 10 minutos.
# La ruta hace skip si no hay partidos en la ventana [-20min, +2.75h], y pide
# solo la(s) sub-ronda(s) en juego (1 request/corrida en grupos), así que en
# la práctica solo consume cuota durante ventanas de partido.
# Con clave gratuita (100 req/día): ~70 req en el día más cargado de grupos.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-matches endpoint
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync-matches"
