name: Sync matches

# DESACTIVADO: cron-job.org maneja el sync cada 10 min de forma más confiable
# y sin riesgo de duplicar llamadas a TheSportsDB (100 req/día gratis).
# Conservado para disparos manuales desde GitHub si es necesario.
on:
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-matches endpoint
        run: |
          # -L sigue redirects (Vercel devuelve 308 http→https / apex→www);
          # --location-trusted conserva el header Authorization tras el redirect.
          curl --fail --location-trusted -L --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync-matches"
