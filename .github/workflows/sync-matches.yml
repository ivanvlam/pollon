name: Sync matches

# Sincroniza fixture y resultados desde API-Football cada 5 minutos.
# Reemplaza el cron de Vercel (que en plan Hobby solo corre 1 vez/día).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-matches endpoint
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync-matches"
