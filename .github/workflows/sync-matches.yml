name: Sync matches

# Sincroniza fixture y resultados desde TheSportsDB cada 15 minutos.
# La ruta hace skip si no hay partidos en la ventana [-3h, +2h], así que
# en la práctica solo consume cuota de la API durante ventanas de partido.
# Con clave gratuita (100 req/día): ~40 req en el día más cargado.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-matches endpoint
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync-matches"
