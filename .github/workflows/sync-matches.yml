name: Sync matches

# Sincroniza fixture y resultados desde TheSportsDB cada 10 minutos.
# La ruta hace skip si no hay partidos en la ventana [-3h, +2.75h], y pide
# solo la(s) sub-ronda(s) en juego (1 request/corrida en grupos), así que en
# la práctica solo consume cuota durante ventanas de partido.
# NOTA: GitHub Actions atrasa los cron programados (suele correr ~cada hora,
# no cada 10 min). Para frescura real de 10 min usar un cron externo confiable
# (ej. cron-job.org) apuntando al mismo endpoint.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-matches endpoint
        run: |
          # -L sigue redirects (Vercel devuelve 308 http→https / apex→www);
          # --location-trusted conserva el header Authorization tras el redirect.
          code=$(curl -s -L --location-trusted -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync-matches")
          echo "HTTP status (final): $code"
          echo "--- response body (first 400 bytes) ---"
          head -c 400 /tmp/body || true
          echo
          [ "${code:0:1}" = "2" ]
